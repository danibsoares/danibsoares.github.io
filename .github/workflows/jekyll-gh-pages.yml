# Deploy de site estático para GitHub Pages
# Portfólio da Daniella Bastos — danibsoares.github.io
name: Deploy Portfolio to GitHub Pages

on:
  # Dispara ao fazer push na branch main
  push:
    branches: ["main"]

  # Permite rodar manualmente pela aba Actions no GitHub
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy roda por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar arquivos estáticos
        uses: actions/upload-pages-artifact@v3
        with:
          # Envia tudo da raiz do repositório
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
